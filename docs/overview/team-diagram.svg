<svg viewBox="0 0 960 680" xmlns="http://www.w3.org/2000/svg" role="img" style="width:100%;max-width:960px;font-family:system-ui,-apple-system,sans-serif;">
  <title>LDD Team Structure — with Escalation Routes</title>
